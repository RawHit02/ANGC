<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ANGC Synapse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-main { padding-top: 120px; min-height: 100vh; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 2rem; background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .data-table th, .data-table td { padding: 1.2rem; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { background: rgba(255,255,255,0.05); color: var(--accent); font-family: 'Outfit', sans-serif; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; background: var(--accent); color: var(--bg-dark); }
        .tab-buttons { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .tab-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.8rem 1.5rem; border-radius: 8px; cursor: pointer; transition: var(--transition); }
        .tab-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(56, 189, 248, 0.1); }
    </style>
</head>
<body class="dark-mode">
    <header id="main-header" class="scrolled">
        <nav class="container header-grid">
            <div class="header-left"><div class="logo"><span class="logo-text">ANGC <span class="accent">Admin</span></span></div></div>
            <div class="header-center"><ul class="nav-links"><li><a href="index.html">Back to Site</a></li></ul></div>
            <div class="header-right"><span class="badge">Live Monitoring</span></div>
        </nav>
    </header>

    <main class="admin-main container">
        <div class="section-header">
            <h1>Data <span class="gradient-text">Insights</span></h1>
            <p>Real-time analytics for visitors and enquiries.</p>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('visits')">Visitor Logs</button>
            <button class="tab-btn" onclick="showTab('contacts')">Recent Enquiries</button>
            <button class="tab-btn" onclick="showTab('users')">Registered Users</button>
        </div>

        <div id="visits-view">
            <h3>Recent Site Traffic</h3>
            <table class="data-table">
                <thead><tr><th>Time</th><th>IP Address</th><th>Path</th><th>Browser</th></tr></thead>
                <tbody id="visits-body"><tr><td colspan="4" style="text-align:center">Loading data...</td></tr></tbody>
            </table>
        </div>

        <div id="contacts-view" style="display:none">
            <h3>Latest Enquiries</h3>
            <table class="data-table">
                <thead><tr><th>Time</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th></tr></thead>
                <tbody id="contacts-body"><tr><td colspan="5" style="text-align:center">Loading data...</td></tr></tbody>
            </table>
        </div>

        <div id="users-view" style="display:none">
            <h3>Platform Users</h3>
            <table class="data-table">
                <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Joined</th></tr></thead>
                <tbody id="users-body"><tr><td colspan="4" style="text-align:center">Loading data...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchData() {
            try {
                const [visits, contacts, users] = await Promise.all([
                    fetch('/api/logs').then(res => res.json()),
                    fetch('/api/contacts').then(res => res.json()),
                    fetch('/api/users').then(res => res.json())
                ]);

                renderTable('visits-body', visits, ['timestamp', 'ip', 'path', 'user_agent']);
                renderTable('contacts-body', contacts, ['timestamp', 'name', 'email', 'subject', 'message']);
                renderTable('users-body', users, ['id', 'username', 'email', 'timestamp']);
            } catch (e) {
                console.error('Fetch error:', e);
                const msgVisits = '<tr><td colspan="4" style="text-align:center;color:red">Server Offline - Run Node.js to see live data</td></tr>';
                const msgContacts = '<tr><td colspan="5" style="text-align:center;color:red">Server Offline - Run Node.js to see live data</td></tr>';
                document.getElementById('visits-body').innerHTML = msgVisits;
                document.getElementById('contacts-body').innerHTML = msgContacts;
            }
        }

        function renderTable(id, data, keys) {
            const body = document.getElementById(id);
            const colCount = keys.length;
            if (!data || data.length === 0) { body.innerHTML = `<tr><td colspan="${colCount}" style="text-align:center">No data found yet.</td></tr>`; return; }
            body.innerHTML = data.map(item => `
                <tr>
                    ${keys.map(k => `<td>${item[k] || 'N/A'}</td>`).join('')}
                </tr>
            `).join('');
        }

        function showTab(type) {
            document.getElementById('visits-view').style.display = type === 'visits' ? 'block' : 'none';
            document.getElementById('contacts-view').style.display = type === 'contacts' ? 'block' : 'none';
            document.getElementById('users-view').style.display = type === 'users' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(type)));
        }

        fetchData();
        setInterval(fetchData, 10000); // Auto refresh
    </script>
</body>
</html>
