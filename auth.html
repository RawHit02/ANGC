<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | ANGC Synapse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-surface) 100%);
            color: var(--text-primary);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
        }

        .auth-logo .accent {
            color: var(--accent);
        }

        .auth-tabs {
            display: flex;
            background: var(--bg-dark);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .auth-tab.active {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .auth-form {
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-left: 4px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        /* Prevent browser autofill background */
        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover, 
        .form-group input:-webkit-autofill:focus, 
        .form-group input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px var(--bg-dark) inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
        }

        .form-group input:focus {
            border-color: var(--accent);
            background: var(--bg-surface);
            outline: none;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-submit {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.4);
        }

        .skip-btn {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .skip-btn:hover {
            color: #fff;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="light-mode">
    <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'){document.body.classList.remove('light-mode');document.body.classList.add('dark-mode');}})();</script>
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">ANGC <span class="accent">Synapse</span></a>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Empowering your digital future.</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active" autocomplete="off">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="example@gmail.com" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="********" required autocomplete="new-password">
                </div>
                <button type="submit" class="auth-btn btn-submit">Sign In</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form" autocomplete="off">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" placeholder="rohit_123" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="example@gmail.com" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Min. 8 characters" required autocomplete="new-password">
                </div>
                <button type="submit" class="auth-btn btn-submit">Create Account</button>
            </form>

            <a href="index.html" class="skip-btn">Skip for now &rarr;</a>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function switchTab(type) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            document.getElementById(`tab-${type}`).classList.add('active');
            document.getElementById(`${type}-form`).classList.add('active');
        }

        // Handle Signup
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Creating account...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('signup-username').value,
                        email: document.getElementById('signup-email').value,
                        password: document.getElementById('signup-password').value
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message, 'success');
                    localStorage.setItem('isKnownUser', 'true');
                    switchTab('login'); // Success, go to login
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            } finally {
                btn.innerText = 'Create Account';
                btn.disabled = false;
            }
        });

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Signing in...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('login-email').value,
                        password: document.getElementById('login-password').value
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Welcome back, ${result.user.username}!`, 'success');
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('isKnownUser', 'true');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            } finally {
                btn.innerText = 'Sign In';
                btn.disabled = false;
            }
        });
        // Handle URL parameter for tab selection
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            if (mode === 'signup' || mode === 'login') {
                switchTab(mode);
            }
        });
    </script>
</body>
</html>
